name: Build Cross-Platform Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            platform: linux
            artifact_name: mp3-cover-art-manager-linux
            icon_name: cover_finder.svg
          - os: windows-latest
            platform: windows
            artifact_name: mp3-cover-art-manager-windows
            icon_name: cover_finder.svg
          - os: macos-latest
            platform: macos
            artifact_name: mp3-cover-art-manager-macos
            icon_name: cover_finder.svg

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller PyQt6 requests mutagen

    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --windowed --name=mp3-cover-art-manager --icon=cover_finder.svg cover_finder.py

    - name: Copy translation files
      run: |
        mkdir -p dist/translations
        cp cover_art_*.qm dist/translations/ || true

    - name: Create archive (Linux)
      if: matrix.platform == 'linux'
      run: |
        cd dist
        tar czf ../${{ matrix.artifact_name }}.tar.gz mp3-cover-art-manager translations/
        cd ..

    - name: Create archive (Windows)
      if: matrix.platform == 'windows'
      run: |
        cd dist
        7z a ../${{ matrix.artifact_name }}.zip mp3-cover-art-manager.exe translations/
        cd ..

    - name: Create archive (macOS)
      if: matrix.platform == 'macos'
      run: |
        cd dist
        tar czf ../${{ matrix.artifact_name }}.tar.gz mp3-cover-art-manager translations/
        cd ..

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: |
          ${{ matrix.platform == 'windows' && format('{0}.zip', matrix.artifact_name) || format('{0}.tar.gz', matrix.artifact_name) }}

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ${{ matrix.platform == 'windows' && format('{0}.zip', matrix.artifact_name) || format('{0}.tar.gz', matrix.artifact_name) }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
